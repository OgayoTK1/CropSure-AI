name: cropsure
description: CropSure AI — Farm-level parametric crop insurance for African smallholder farmers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Maps & GPS
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  flutter_map_geojson: ^1.0.8

  # Charts
  fl_chart: ^0.68.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  lottie: ^3.1.2
  pinput: ^5.0.0

  # Internationalisation
  intl: ^0.20.2

  # Utils
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/i18n/
