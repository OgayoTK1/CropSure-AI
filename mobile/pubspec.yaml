name: cropsure
description: CropSure AI — Farm-level parametric crop insurance for Kenya
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Maps & GPS
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Charts
  fl_chart: ^0.68.0

  # Navigation & State
  go_router: ^13.2.0
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3

  # UI
  url_launcher: ^6.3.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
